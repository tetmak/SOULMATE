<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Soulnum</title>
    <script src="js/theme-engine.js"></script>
    <script src="js/i18n-engine.js"></script>
    <script src="js/tailwind.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="js/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#FAC638"},fontFamily:{display:["Space Grotesk","sans-serif"]}}}};</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', sans-serif; min-height: 100dvh; overflow-x: hidden; }
        .cosmic-bg {
            position: fixed; inset: 0; z-index: 0;
            background: url('images/signup-bg.png') center center / cover no-repeat;
            background-color: #0a0a1a;
        }
        .content { position: relative; z-index: 1; }
        .btn-social {
            width: 100%; height: 56px; border-radius: 28px; display: flex; align-items: center;
            justify-content: center; gap: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; border: none; font-family: 'Space Grotesk', sans-serif;
        }
        .btn-social:active { transform: scale(0.98); }
        .btn-apple { background: #000; color: #fff; }
        .btn-apple:hover { background: #1a1a1a; }
        .btn-google { background: rgba(0,0,0,0.06); color: #1a1a1a; border: 1px solid rgba(0,0,0,0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .btn-google:hover { background: rgba(0,0,0,0.1); }
        .expand-section { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; opacity: 0; }
        .expand-section.open { max-height: 500px; opacity: 1; }
        .input-field {
            height: 52px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.12);
            background: rgba(255,255,255,0.65); color: #1a1a1a; padding: 0 16px; font-size: 16px;
            font-family: 'Space Grotesk', sans-serif; outline: none; transition: border-color 0.2s;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .input-field::placeholder { color: rgba(0,0,0,0.35); }
        .input-field:focus { border-color: #b08d57; }
        .btn-primary {
            width: 100%; height: 52px; border-radius: 26px; background: #FAC638; color: #0a0a1a;
            font-size: 16px; font-weight: 700; border: none; cursor: pointer;
            font-family: 'Space Grotesk', sans-serif; transition: all 0.2s;
            box-shadow: 0 0 30px rgba(250,198,56,0.25);
        }
        .btn-primary:hover { background: #f5be2a; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        /* OTP code inputs */
        .otp-input {
            width: 48px; height: 56px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.12);
            background: rgba(255,255,255,0.65); color: #1a1a1a; font-size: 24px; font-weight: 700;
            text-align: center; font-family: 'Space Grotesk', sans-serif; outline: none;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); transition: border-color 0.2s;
        }
        .otp-input:focus { border-color: #b08d57; }
        /* Screen transitions */
        .screen { transition: opacity 0.3s ease, transform 0.3s ease; }
        .screen.hidden { display: none; }
    </style>
</head>
<body>
    <div class="cosmic-bg"></div>

    <!-- ============ SCREEN 1: MAIN LOGIN ============ -->
    <div id="screen-main" class="content screen flex flex-col min-h-screen max-w-[430px] mx-auto px-6">
        <!-- Top bar -->
        <div class="flex items-center justify-between pt-14 pb-4">
            <div onclick="window.location.href='cosmic_onboarding_welcome.html'" class="text-black/40 flex items-center cursor-pointer hover:text-black/60 transition-colors">
                <span class="material-symbols-outlined text-[22px]">arrow_back_ios</span>
            </div>
            <button id="btn-lang-selector" class="text-black/40 hover:text-black/60 transition-colors cursor-pointer" title="Language">
                <span class="text-lg" id="lang-flag"></span>
            </button>
        </div>

        <!-- Spacer -->
        <div class="flex-1"></div>

        <!-- Bottom content -->
        <div class="flex flex-col items-center pb-8">
            <!-- Apple Sign In -->
            <button id="btn-apple" class="btn-social btn-apple mb-3">
                <svg width="18" height="20" viewBox="0 0 17 20" fill="currentColor">
                    <path d="M12.55 0c.1.85-.25 1.7-.75 2.35-.5.65-1.35 1.15-2.15 1.1-.1-.85.3-1.75.75-2.3.55-.65 1.4-1.1 2.15-1.15zm2.6 6.7c-.05.05-1.6.95-1.6 2.85.05 2.25 1.95 3.05 2 3.05-.05.05-.3 1.1-1.05 2.15-.65.95-1.3 1.9-2.4 1.9-1.05.05-1.35-.65-2.55-.65-1.2 0-1.55.6-2.55.65-1.05.05-1.85-1-2.5-1.95-1.35-1.95-2.35-5.5-1-7.9.65-1.2 1.85-1.95 3.15-2 1.05-.05 2 .7 2.6.7.6 0 1.8-.85 3.05-.75.5.05 2 .2 2.9 1.55l-.05.4z"/>
                </svg>
                <span data-i18n="signup.btn_apple_connect">Apple ile baglan</span>
            </button>

            <!-- Diger secenekler toggle -->
            <button id="btn-other-options" class="text-black/70 font-semibold text-[15px] mt-1 mb-4 cursor-pointer hover:text-black/90 transition-colors" style="background:none;border:none;font-family:'Space Grotesk',sans-serif" data-i18n="signup.other_options">Diger secenekler</button>

            <!-- Expandable section -->
            <div id="expand-section" class="expand-section w-full">
                <!-- Google Sign In -->
                <button id="btn-google" class="btn-social btn-google mb-3">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span data-i18n="signup.btn_google_connect">Google ile baglan</span>
                </button>

                <!-- Divider -->
                <div class="flex items-center gap-3 my-3">
                    <hr class="flex-1 border-black/10" />
                    <span class="text-black/30 text-xs font-medium">veya</span>
                    <hr class="flex-1 border-black/10" />
                </div>

                <!-- Phone number input -->
                <div class="flex gap-2 mb-3">
                    <div class="input-field flex items-center gap-1 px-3 cursor-pointer" id="country-selector" style="width:90px;flex-shrink:0">
                        <span id="country-flag" class="text-lg">🇹🇷</span>
                        <span id="country-code" class="text-sm font-semibold text-black/70">+90</span>
                        <span class="material-symbols-outlined text-black/30 text-[16px]">expand_more</span>
                    </div>
                    <input id="input-phone" class="input-field flex-1" type="tel" placeholder="5XX XXX XX XX" inputmode="numeric" style="width:100%" />
                </div>

                <button id="btn-send-code" class="btn-primary mb-3">
                    <span data-i18n="signup.btn_send_code">Kod Gonder</span>
                </button>
            </div>

            <!-- Legal text -->
            <p class="text-black/30 text-[11px] text-center leading-relaxed px-4 mt-2" data-i18n="signup.legal_text">
                Kaydolarak, <a href="javascript:void(0)" class="underline text-black/40 hover:text-black/50">Genel Kullanim Kosullarimizi</a> ve <a href="javascript:void(0)" class="underline text-black/40 hover:text-black/50">Gizlilik Politikamizi</a> kabul etmis olursun.
            </p>

            <a id="btn-trouble" class="text-black/30 text-[11px] mt-3 mb-2 cursor-pointer hover:text-black/40 underline transition-colors" data-i18n="signup.trouble_link">Baglanti sorunu mu?</a>
        </div>
    </div>

    <!-- ============ SCREEN 2: OTP VERIFICATION ============ -->
    <div id="screen-otp" class="content screen hidden flex flex-col min-h-screen max-w-[430px] mx-auto px-6">
        <!-- Top bar -->
        <div class="flex items-center justify-between pt-14 pb-4">
            <div id="btn-otp-back" class="text-black/40 flex items-center cursor-pointer hover:text-black/60 transition-colors">
                <span class="material-symbols-outlined text-[22px]">arrow_back_ios</span>
            </div>
            <div></div>
        </div>

        <!-- OTP Content -->
        <div class="flex flex-col items-center pt-8">
            <div class="w-16 h-16 mb-6 bg-black/5 rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined text-black/60 text-3xl">sms</span>
            </div>
            <h2 class="text-black/80 text-xl font-bold text-center mb-2" data-i18n="signup.otp_title">Kodunu gir</h2>
            <p class="text-black/40 text-sm text-center mb-8">
                <span id="otp-phone-display"></span>
                <span data-i18n="signup.otp_subtitle"> numarasina kod gonderdik</span>
            </p>

            <!-- 6-digit OTP inputs -->
            <div class="flex gap-2 mb-6" id="otp-container">
                <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" data-idx="0" />
                <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" data-idx="1" />
                <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" data-idx="2" />
                <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" data-idx="3" />
                <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" data-idx="4" />
                <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" data-idx="5" />
            </div>

            <button id="btn-verify" class="btn-primary mb-4" disabled>
                <span data-i18n="signup.btn_verify">Dogrula</span>
            </button>

            <p class="text-black/40 text-sm text-center">
                <span id="resend-timer" data-i18n="signup.otp_resend_wait">60 saniye bekleyin</span>
                <a id="btn-resend" class="text-black/70 font-semibold cursor-pointer hover:underline ml-1 hidden" data-i18n="signup.otp_resend">Tekrar gonder</a>
            </p>
        </div>
    </div>

    <script>
        // Toast helper
        function showToast(msg) {
            var existing = document.getElementById('auth-toast');
            if (existing) existing.remove();
            var toast = document.createElement('div');
            toast.id = 'auth-toast';
            toast.textContent = msg;
            toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-family:Space Grotesk,sans-serif;z-index:999;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);white-space:nowrap;transition:opacity 0.3s';
            document.body.appendChild(toast);
            setTimeout(function() { toast.style.opacity = '0'; setTimeout(function() { toast.remove(); }, 300); }, 3000);
        }

        // Post-login redirect (check profile)
        async function handlePostLogin() {
            var hasProfile = false;
            try {
                var sess = await window.auth.getSession();
                if (sess && sess.user && window.supabaseClient) {
                    var profResult = await window.supabaseClient.from('profiles').select('*').eq('id', sess.user.id).single();
                    var prof = profResult.data;
                    if (!profResult.error && prof && (prof.full_name || prof.name) && prof.birth_date) {
                        localStorage.setItem('numerael_user_data', JSON.stringify({
                            name: prof.full_name || prof.name,
                            birthDate: prof.birth_date,
                            birthTime: prof.birth_time || '',
                            birthPlace: prof.birth_place || '',
                            gender: prof.gender || 'unknown',
                            avatarUrl: prof.avatar_url || ''
                        }));
                        hasProfile = true;
                    }
                }
            } catch(e) { console.warn('[Login] Profil hatasi:', e); }
            window.location.href = hasProfile ? 'mystic_numerology_home_1.html' : 'data-ready_birth_form.html';
        }

        // Main Auth Logic
        (function () {
            var currentPhone = '';
            var countryCode = '+90';
            var resendInterval = null;

            var btnApple = document.getElementById('btn-apple');
            var btnGoogle = document.getElementById('btn-google');
            var btnOther = document.getElementById('btn-other-options');
            var expandSection = document.getElementById('expand-section');
            var btnSendCode = document.getElementById('btn-send-code');
            var inputPhone = document.getElementById('input-phone');
            var screenMain = document.getElementById('screen-main');
            var screenOtp = document.getElementById('screen-otp');
            var btnOtpBack = document.getElementById('btn-otp-back');
            var btnVerify = document.getElementById('btn-verify');
            var btnResend = document.getElementById('btn-resend');
            var resendTimer = document.getElementById('resend-timer');
            var otpPhoneDisplay = document.getElementById('otp-phone-display');
            var otpInputs = document.querySelectorAll('.otp-input');

            // "Diger secenekler" toggle
            if (btnOther) {
                btnOther.addEventListener('click', function() {
                    expandSection.classList.add('open');
                    btnOther.style.display = 'none';
                });
            }

            // Apple Sign In
            if (btnApple) {
                btnApple.addEventListener('click', async function () {
                    try { await window.auth.signInWithApple(); }
                    catch (e) { showToast('Hata: ' + e.message); }
                });
            }

            // Google Sign In
            if (btnGoogle) {
                btnGoogle.addEventListener('click', async function () {
                    try { await window.auth.signInWithGoogle(); }
                    catch (e) { showToast('Hata: ' + e.message); }
                });
            }

            // Phone format helper
            function formatPhone(raw) {
                var digits = raw.replace(/\D/g, '');
                // Remove leading 0
                if (digits.charAt(0) === '0') digits = digits.substring(1);
                return countryCode + digits;
            }

            // Send OTP
            if (btnSendCode) {
                btnSendCode.addEventListener('click', async function() {
                    var raw = inputPhone.value.trim();
                    if (!raw || raw.replace(/\D/g, '').length < 7) {
                        showToast('Lutfen gecerli bir telefon numarasi girin');
                        return;
                    }
                    currentPhone = formatPhone(raw);
                    btnSendCode.disabled = true;
                    btnSendCode.querySelector('span').textContent = 'Gonderiliyor...';

                    try {
                        await window.auth.signInWithPhone(currentPhone);
                        // Switch to OTP screen
                        screenMain.classList.add('hidden');
                        screenOtp.classList.remove('hidden');
                        otpPhoneDisplay.textContent = currentPhone;
                        otpInputs[0].focus();
                        startResendTimer();
                    } catch(e) {
                        showToast('Hata: ' + e.message);
                    } finally {
                        btnSendCode.disabled = false;
                        btnSendCode.querySelector('span').textContent = 'Kod Gonder';
                    }
                });
            }

            // OTP Back button
            if (btnOtpBack) {
                btnOtpBack.addEventListener('click', function() {
                    screenOtp.classList.add('hidden');
                    screenMain.classList.remove('hidden');
                    clearOtpInputs();
                    if (resendInterval) clearInterval(resendInterval);
                });
            }

            // OTP input behavior (auto-advance, backspace, paste)
            otpInputs.forEach(function(inp, i) {
                inp.addEventListener('input', function(e) {
                    var val = this.value.replace(/\D/g, '');
                    this.value = val.charAt(0) || '';
                    if (val && i < otpInputs.length - 1) otpInputs[i + 1].focus();
                    checkOtpComplete();
                });
                inp.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !this.value && i > 0) {
                        otpInputs[i - 1].focus();
                        otpInputs[i - 1].value = '';
                    }
                });
                // Paste support
                inp.addEventListener('paste', function(e) {
                    e.preventDefault();
                    var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
                    for (var j = 0; j < otpInputs.length && j < pasted.length; j++) {
                        otpInputs[j].value = pasted.charAt(j);
                    }
                    var focusIdx = Math.min(pasted.length, otpInputs.length - 1);
                    otpInputs[focusIdx].focus();
                    checkOtpComplete();
                });
            });

            function getOtpCode() {
                var code = '';
                otpInputs.forEach(function(inp) { code += inp.value; });
                return code;
            }

            function checkOtpComplete() {
                var code = getOtpCode();
                btnVerify.disabled = code.length < 6;
            }

            function clearOtpInputs() {
                otpInputs.forEach(function(inp) { inp.value = ''; });
                btnVerify.disabled = true;
            }

            // Verify OTP
            if (btnVerify) {
                btnVerify.addEventListener('click', async function() {
                    var code = getOtpCode();
                    if (code.length < 6) return;
                    btnVerify.disabled = true;
                    btnVerify.querySelector('span').textContent = 'Dogrulanıyor...';

                    try {
                        await window.auth.verifyPhoneOtp(currentPhone, code);
                        await handlePostLogin();
                    } catch(e) {
                        showToast('Kod hatali. Tekrar deneyin.');
                        clearOtpInputs();
                        otpInputs[0].focus();
                    } finally {
                        btnVerify.disabled = false;
                        btnVerify.querySelector('span').textContent = 'Dogrula';
                    }
                });
            }

            // Resend timer (60s cooldown)
            function startResendTimer() {
                var seconds = 60;
                btnResend.classList.add('hidden');
                resendTimer.classList.remove('hidden');
                resendTimer.textContent = seconds + ' saniye bekleyin';

                if (resendInterval) clearInterval(resendInterval);
                resendInterval = setInterval(function() {
                    seconds--;
                    if (seconds <= 0) {
                        clearInterval(resendInterval);
                        resendTimer.classList.add('hidden');
                        btnResend.classList.remove('hidden');
                    } else {
                        resendTimer.textContent = seconds + ' saniye bekleyin';
                    }
                }, 1000);
            }

            // Resend OTP
            if (btnResend) {
                btnResend.addEventListener('click', async function() {
                    try {
                        await window.auth.signInWithPhone(currentPhone);
                        showToast('Kod tekrar gonderildi');
                        startResendTimer();
                    } catch(e) {
                        showToast('Hata: ' + e.message);
                    }
                });
            }
        })();

        // Language Selector
        (function() {
            var langBtn = document.getElementById('btn-lang-selector');
            var flagEl = document.getElementById('lang-flag');
            if (!langBtn || !window.i18n) return;
            var langs = window.i18n.languages();
            function updateFlag() {
                var cur = window.i18n.current();
                for (var i = 0; i < langs.length; i++) {
                    if (langs[i].code === cur) { flagEl.textContent = langs[i].flag; break; }
                }
            }
            updateFlag();
            langBtn.addEventListener('click', function() {
                var overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)';
                var html = '<div style="background:#1a1810;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:24px;width:90%;max-width:340px;max-height:80vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,0.25)">';
                html += '<h3 style="color:#fff;font-size:16px;font-weight:800;margin-bottom:16px;text-align:center;font-family:Space Grotesk,sans-serif">' + window.i18n.t('signup.select_language', 'Select Language') + '</h3>';
                html += '<div style="display:flex;flex-direction:column;gap:4px">';
                var current = window.i18n.current();
                for (var i = 0; i < langs.length; i++) {
                    var l = langs[i];
                    var isActive = l.code === current;
                    var itemBg = isActive ? 'rgba(250,198,56,0.15)' : 'transparent';
                    var itemBorder = isActive ? '2px solid #FAC638' : '2px solid transparent';
                    html += '<div class="lang-option" data-lang="' + l.code + '" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;cursor:pointer;background:' + itemBg + ';border:' + itemBorder + ';transition:background 0.15s">';
                    html += '<span style="font-size:24px">' + l.flag + '</span>';
                    html += '<div style="flex:1"><p style="color:#fff;font-size:14px;font-weight:600;margin:0">' + l.native + '</p></div>';
                    if (isActive) html += '<span class="material-symbols-outlined" style="color:#FAC638;font-size:20px">check_circle</span>';
                    html += '</div>';
                }
                html += '</div></div>';
                overlay.innerHTML = html;
                document.body.appendChild(overlay);
                overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
                var options = overlay.querySelectorAll('.lang-option');
                for (var j = 0; j < options.length; j++) {
                    options[j].addEventListener('click', function() {
                        window.i18n.set(this.getAttribute('data-lang'));
                        updateFlag();
                        overlay.remove();
                    });
                }
            });
        })();
    </script>
</body>
</html>
